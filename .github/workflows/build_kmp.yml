name: Multi-OS Desktop & Android Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle memory for CI
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx1536M
          org.gradle.workers.max=2
          EOF

      - name: Clean & Build Android Debug APK
        run: ./gradlew clean :composeApp:assembleDebug

      - name: Upload Android Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-Debug
          path: composeApp/build/outputs/apk/debug/**/*.apk
          if-no-files-found: error

  build-android-release-unsigned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle memory for CI
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx1536M
          org.gradle.workers.max=2
          EOF

      - name: Clean & Build Android Release APK (unsigned)
        run: ./gradlew clean :composeApp:assembleRelease

      - name: Upload Android Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-Release-Unsigned
          path: composeApp/build/outputs/apk/release/**/*.apk
          if-no-files-found: error

  build-automotive-release-unsigned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle memory for CI
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx1536M
          org.gradle.workers.max=2
          EOF

      - name: Clean & Build Automotive Release APK (unsigned)
        run: ./gradlew clean :automotiveApp:assembleRelease

      - name: Upload Automotive Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: Automotive-APK-Release-Unsigned
          path: automotiveApp/build/outputs/apk/release/**/*.apk
          if-no-files-found: error

  build-tv-release-unsigned:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle memory for CI
        shell: bash
        run: |
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx1536M
          org.gradle.workers.max=2
          EOF

      - name: Clean & Build TV Release APK (unsigned)
        run: ./gradlew clean :tvApp:assembleRelease

      - name: Upload TV Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: TV-APK-Release-Unsigned
          path: tvApp/build/outputs/apk/release/**/*.apk
          if-no-files-found: error

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Clean & Build Desktop App (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat clean :composeApp:packageDistributionForCurrentOS

      - name: Clean & Build Desktop App (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew clean :composeApp:packageDistributionForCurrentOS

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App-${{ runner.os }}
          path: composeApp/build/compose/binaries/**
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build-android-debug
      - build-android-release-unsigned
      - build-automotive-release-unsigned
      - build-tv-release-unsigned
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show downloaded files
        shell: bash
        run: find release-assets -type f | sort

      - name: Decide release type
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ "$TAG" =~ -(beta|rc)([.-].*)?$ ]]; then
            echo "kind=prerelease" >> "$GITHUB_OUTPUT"
            echo "title=${TAG} Pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "kind=draft" >> "$GITHUB_OUTPUT"
            echo "title=${TAG} Draft Release" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md << EOF
          Automated release for tag ${GITHUB_REF_NAME}

          Included artifacts:
          - Android Debug APK
          - Android Release APK (unsigned)
          - Automotive Release APK (unsigned)
          - TV Release APK (unsigned)
          - Desktop packages for matrix builds

          Please review the assets before publishing if this is a draft release.
          EOF

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' FILES < <(find release-assets -type f \
            \( -name "*.apk" \
            -o -name "*.aab" \
            -o -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.dmg" \
            -o -name "*.pkg" \
            -o -name "*.deb" \
            -o -name "*.rpm" \
            -o -name "*.AppImage" \
            -o -name "*.zip" \
            -o -name "*.tar.gz" \) \
            -print0)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          EXTRA_ARGS=()
          if [ "${{ steps.meta.outputs.kind }}" = "prerelease" ]; then
            EXTRA_ARGS+=(--prerelease)
          else
            EXTRA_ARGS+=(--draft)
          fi

          gh release create "${GITHUB_REF_NAME}" \
            "${FILES[@]}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            "${EXTRA_ARGS[@]}"
