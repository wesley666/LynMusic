name: Multi-OS Desktop & Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build Android Debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: composeApp/build/outputs/apk/debug/**/*.apk
          if-no-files-found: error

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build Desktop App (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :composeApp:packageDistributionForCurrentOS

      - name: Build Desktop App (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./gradlew :composeApp:packageDistributionForCurrentOS

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App-${{ runner.os }}
          path: composeApp/build/compose/binaries/**
          if-no-files-found: error
